name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            APP_NAME="production-mis"
            APP_ROOT="/var/www/html"
            LIVE_DIR="$APP_ROOT/$APP_NAME"
            DEPLOY_ROOT="$APP_ROOT/.deployments/$APP_NAME"
            RELEASES_DIR="$DEPLOY_ROOT/releases"
            TIMESTAMP="$(date +%Y%m%d%H%M%S)"
            RELEASE_DIR="$RELEASES_DIR/$TIMESTAMP"
            BACKUP_DIR="$RELEASES_DIR/rollback-$TIMESTAMP"
            ENV_BACKUP="/tmp/${APP_NAME}.env"
            NPM_CACHE_DIR="/tmp/.npm-${APP_NAME}"
            REPO_URL=""
            MIN_FREE_KB=1048576

            echo "== SAFE DEPLOY START =="
            echo "Live dir: $LIVE_DIR"

            mkdir -p "$DEPLOY_ROOT" "$RELEASES_DIR"
            # Ensure a failed run does not leave a partial release occupying disk.
            trap 'rm -rf "$RELEASE_DIR"' ERR

            echo "== DISK BEFORE CLEANUP =="
            df -h "$APP_ROOT" || true

            # Free space early.
            find "$RELEASES_DIR" -maxdepth 1 -mindepth 1 -type d | sort | head -n -1 | xargs -r rm -rf
            rm -rf "$RELEASES_DIR"/rollback-* || true
            rm -rf "$NPM_CACHE_DIR"
            pm2 flush || true
            rm -rf "$HOME/.npm/_cacache" || true

            echo "== DISK AFTER CLEANUP =="
            df -h "$APP_ROOT" || true
            FREE_KB="$(df -Pk "$APP_ROOT" | awk 'NR==2 {print $4}')"
            echo "Free space (KB): $FREE_KB"

            # Emergency cleanup if disk is still too full.
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "== EMERGENCY CLEANUP =="
              rm -rf "$DEPLOY_ROOT/repo.git" || true
              find /home -type f -path "*/.pm2/logs/*.log" -delete 2>/dev/null || true
              rm -rf /tmp/.npm-* || true
              df -h "$APP_ROOT" || true
            fi

            if [ -f "$LIVE_DIR/.env" ]; then
              cp "$LIVE_DIR/.env" "$ENV_BACKUP"
            fi

            if [ -d "$LIVE_DIR/.git" ]; then
              REPO_URL="$(git -C "$LIVE_DIR" config --get remote.origin.url || true)"
            fi

            if [ -z "$REPO_URL" ] && [ -d "$DEPLOY_ROOT/repo.git" ]; then
              REPO_URL="$(git --git-dir="$DEPLOY_ROOT/repo.git" config --get remote.origin.url || true)"
            fi

            if [ -z "$REPO_URL" ]; then
              echo "Remote origin URL not found; cannot continue deploy."
              exit 1
            fi

            echo "Using repo: $REPO_URL"
            git clone --depth 1 --branch main "$REPO_URL" "$RELEASE_DIR"
            rm -rf "$RELEASE_DIR/.git"

            if [ -f "$ENV_BACKUP" ]; then
              cp "$ENV_BACKUP" "$RELEASE_DIR/.env"
            fi

            cd "$RELEASE_DIR"
            rm -rf .next/cache
            # Use temporary cache outside release dir to reduce repeated disk growth.
            npm install --cache "$NPM_CACHE_DIR" --no-audit --no-fund
            npm run build

            echo "== BUILD SUCCEEDED =="

            if [ -d "$LIVE_DIR" ]; then
              mv "$LIVE_DIR" "$BACKUP_DIR"
            fi

            mv "$RELEASE_DIR" "$LIVE_DIR"

            if pm2 restart "$APP_NAME" --update-env --cwd "$LIVE_DIR"; then
              echo "PM2 restart succeeded"
            elif pm2 start npm --name "$APP_NAME" --cwd "$LIVE_DIR" -- start; then
              echo "PM2 start succeeded"
            else
              echo "PM2 failed; rolling back"
              rm -rf "$LIVE_DIR"
              if [ -d "$BACKUP_DIR" ]; then
                mv "$BACKUP_DIR" "$LIVE_DIR"
                pm2 restart "$APP_NAME" --update-env --cwd "$LIVE_DIR" || true
              fi
              exit 1
            fi

            pm2 save
            pm2 status

            rm -rf "$BACKUP_DIR"
            rm -rf "$NPM_CACHE_DIR"
            find "$RELEASES_DIR" -maxdepth 1 -mindepth 1 -type d | sort | head -n -3 | xargs -r rm -rf

            echo "== SAFE DEPLOY COMPLETE =="
