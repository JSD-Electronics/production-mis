name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /var/www/html/production-mis

            echo "== DEPLOY START =="
            pwd
            git status --short || true

            # Free up space before Git operations
            rm -rf .next/cache
            npm cache clean --force
            pm2 flush || true

            # Keep server-only env values while forcing the code checkout to match origin/main.
            cp .env /tmp/production-mis.env || true
            git merge --abort || true
            git rebase --abort || true
            rm -f .git/index.lock .git/MERGE_HEAD .git/MERGE_MSG .git/ORIG_HEAD
            git reset --hard || true
            git fetch --prune origin main
            git reset --hard FETCH_HEAD
            git clean -fd -e .env
            cp /tmp/production-mis.env .env || true

            echo "== POST GIT SYNC =="
            git rev-parse --short HEAD
            git status --short || true

            npm install
            npm run build
            pm2 restart production-mis || pm2 start npm --name "production-mis" -- start
            pm2 save
            pm2 status
