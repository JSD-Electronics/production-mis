name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -euo pipefail

            APP_NAME="production-mis"
            APP_DIR="/var/www/html/$APP_NAME"
            ENV_BACKUP="/tmp/${APP_NAME}.env"
            PREV_LOCK_HASH=""
            NEW_LOCK_HASH=""

            echo "== SIMPLE DEPLOY START =="
            echo "App dir: $APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Git repository not found at $APP_DIR"
              exit 1
            fi

            df -h / || true

            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$ENV_BACKUP"
            fi

            cd "$APP_DIR"
            if [ -f "package-lock.json" ]; then
              PREV_LOCK_HASH="$(sha1sum package-lock.json | awk '{print $1}')"
            fi

            # Keep deploy small and predictable on low disk instances.
            rm -rf "$HOME/.npm/_cacache" || true
            find "$HOME/.pm2/logs" -type f -name "*.log" -exec truncate -s 0 {} + 2>/dev/null || true

            git fetch --prune origin main
            git reset --hard FETCH_HEAD

            if [ -f "package-lock.json" ]; then
              NEW_LOCK_HASH="$(sha1sum package-lock.json | awk '{print $1}')"
            fi

            if [ -f "$ENV_BACKUP" ]; then
              cp "$ENV_BACKUP" "$APP_DIR/.env"
            fi

            if [ ! -d "node_modules" ] || [ "$PREV_LOCK_HASH" != "$NEW_LOCK_HASH" ]; then
              echo "Installing dependencies (lockfile changed or node_modules missing)..."
              npm ci --no-audit --no-fund --prefer-offline --progress=false
            else
              echo "Skipping dependency install (lockfile unchanged)."
            fi

            npm run build

            if pm2 restart "$APP_NAME" --update-env --cwd "$APP_DIR"; then
              echo "PM2 restart succeeded"
            else
              pm2 start npm --name "$APP_NAME" --cwd "$APP_DIR" -- start
            fi

            pm2 save
            pm2 status
            df -h / || true

            echo "== SIMPLE DEPLOY COMPLETE =="
