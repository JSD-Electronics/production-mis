name: Quality Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Hot-path Budget Check
        run: npm run check:hotpaths

      - name: Regression Checklist Check
        run: npm run check:regression-checklist

      - name: Build
        run: npm run build

      - name: User Message Guard (Changed Lines)
        run: npm run check:user-messages
